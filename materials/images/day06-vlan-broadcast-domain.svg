<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 24px; font-weight: 700; }
      .sub { font-size: 14px; fill: #6b7280; }
      .panelhead { font-size: 16px; font-weight: 700; text-anchor: middle; }
      .vlanlabel { font-size: 14px; font-weight: 700; text-anchor: middle; }
      .srclabel { font-size: 12px; font-weight: 700; text-anchor: middle; fill: #c2410c; }
      .caption { font-size: 14px; font-weight: 700; text-anchor: middle; }
      .linkline { stroke: #cbd5e1; stroke-width: 2.5; }
    </style>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9200"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <g id="pc">
      <rect x="-24" y="-22" width="48" height="33" rx="4" fill="#475569"/>
      <rect x="-19" y="-17.5" width="38" height="24" rx="2" fill="#bfdbfe"/>
      <rect x="-7" y="11" width="14" height="5.5" fill="#475569"/>
      <rect x="-16" y="16.5" width="32" height="4.5" rx="2" fill="#475569"/>
    </g>
    <g id="switchSmall">
      <rect x="-40" y="-26" width="80" height="52" rx="9" fill="#0e9aa7"/>
      <rect x="-40" y="-26" width="80" height="52" rx="9" fill="none" stroke="#0b7a85" stroke-width="2.5"/>
      <line x1="-25" y1="-9" x2="25" y2="-9" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <path d="M -25 -9 L -17 -14.5 L -17 -3.5 Z" fill="#ffffff"/>
      <path d="M 25 -9 L 17 -14.5 L 17 -3.5 Z" fill="#ffffff"/>
      <line x1="-25" y1="9" x2="25" y2="9" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <path d="M -25 9 L -17 3.5 L -17 14.5 Z" fill="#ffffff"/>
      <path d="M 25 9 L 17 3.5 L 17 14.5 Z" fill="#ffffff"/>
    </g>
    <g id="xmark">
      <line x1="-9" y1="-9" x2="9" y2="9" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
      <line x1="9" y1="-9" x2="-9" y2="9" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
      <circle r="16" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    </g>
  </defs>

  <rect width="1100" height="680" fill="#ffffff"/>

  <text class="title" x="40" y="42">VLAN の有無でブロードキャストドメインの範囲が変わる</text>
  <text class="sub" x="40" y="66">同じ 4 台構成でも、ブロードキャストフレーム（例: ARP 要求）が届く範囲が変化する</text>

  <!-- LEFT: no VLAN -->
  <text class="panelhead" x="270" y="112" fill="#c2410c">VLAN なし：全ポートが 1 つのブロードキャストドメイン</text>
  <rect x="60" y="136" width="420" height="460" rx="28" fill="#fff7ed" stroke="#ff9200" stroke-width="2.5" stroke-dasharray="9 6"/>

  <!-- left links -->
  <line class="linkline" x1="160" y1="250" x2="270" y2="385"/>
  <line class="linkline" x1="380" y1="250" x2="270" y2="385"/>
  <line class="linkline" x1="160" y1="520" x2="270" y2="385"/>
  <line class="linkline" x1="380" y1="520" x2="270" y2="385"/>

  <!-- left broadcast arrows (source -> switch -> all other ports) -->
  <line x1="179" y1="273" x2="245" y2="354" stroke="#ff9200" stroke-width="3.5" marker-end="url(#arrowOrange)"/>
  <line x1="289" y1="362" x2="361" y2="273" stroke="#ff9200" stroke-width="3.5" marker-end="url(#arrowOrange)"/>
  <line x1="251" y1="408" x2="179" y2="497" stroke="#ff9200" stroke-width="3.5" marker-end="url(#arrowOrange)"/>
  <line x1="289" y1="408" x2="361" y2="497" stroke="#ff9200" stroke-width="3.5" marker-end="url(#arrowOrange)"/>

  <use href="#switchSmall" x="270" y="385"/>
  <use href="#pc" x="160" y="250"/>
  <use href="#pc" x="380" y="250"/>
  <use href="#pc" x="160" y="520"/>
  <use href="#pc" x="380" y="520"/>
  <text class="srclabel" x="160" y="205">送信元</text>

  <text class="caption" x="270" y="580" fill="#c2410c">→ ブロードキャストが送信元を除く残り3台すべてに到達</text>

  <!-- RIGHT: with VLAN -->
  <text class="panelhead" x="840" y="112">VLAN あり：VLAN ごとに独立したブロードキャストドメイン</text>
  <rect x="610" y="136" width="190" height="460" rx="24" fill="#eff6ff" stroke="#2779ca" stroke-width="2.5" stroke-dasharray="9 6"/>
  <rect x="880" y="136" width="190" height="460" rx="24" fill="#f0fdf4" stroke="#7ea800" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text class="vlanlabel" x="705" y="166" fill="#2779ca">VLAN 10</text>
  <text class="vlanlabel" x="975" y="166" fill="#4d7c0f">VLAN 20</text>

  <!-- right links -->
  <line class="linkline" x1="705" y1="250" x2="840" y2="385"/>
  <line class="linkline" x1="705" y1="520" x2="840" y2="385"/>
  <line class="linkline" x1="975" y1="250" x2="840" y2="385"/>
  <line class="linkline" x1="975" y1="520" x2="840" y2="385"/>

  <!-- reaches same VLAN -->
  <line x1="726" y1="271" x2="812" y2="357" stroke="#ff9200" stroke-width="3.5" marker-end="url(#arrowOrange)"/>
  <line x1="819" y1="406" x2="726" y2="499" stroke="#ff9200" stroke-width="3.5" marker-end="url(#arrowOrange)"/>

  <!-- blocked toward VLAN 20 -->
  <line x1="861" y1="364" x2="878" y2="346" stroke="#94a3b8" stroke-width="3.5" stroke-dasharray="3 5" marker-end="url(#arrowGray)"/>
  <line x1="861" y1="406" x2="878" y2="424" stroke="#94a3b8" stroke-width="3.5" stroke-dasharray="3 5" marker-end="url(#arrowGray)"/>
  <use href="#xmark" x="880" y="345"/>
  <use href="#xmark" x="880" y="425"/>

  <use href="#switchSmall" x="840" y="385"/>
  <use href="#pc" x="705" y="250"/>
  <use href="#pc" x="705" y="520"/>
  <use href="#pc" x="975" y="250"/>
  <use href="#pc" x="975" y="520"/>
  <text class="srclabel" x="705" y="205">送信元</text>

  <text class="caption" x="705" y="580" fill="#1d4ed8">→ 同じ VLAN 内には到達</text>
  <text class="caption" x="975" y="580" fill="#64748b">✕ VLAN 20 には届かない</text>

  <!-- exam point -->
  <rect x="40" y="616" width="1020" height="52" rx="8" fill="#fefce8" stroke="#fde047"/>
  <text x="60" y="647" font-size="14">🎯 試験のポイント: VLAN を 1 つ追加すればブロードキャストドメインも 1 つ増える。異なる VLAN 間ではブロードキャストは届かない（L2 では非到達）。</text>
</svg>
