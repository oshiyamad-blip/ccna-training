<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 26px; font-weight: 700; }
      .sub { font-size: 15px; fill: #6b7280; }
      .devname { font-size: 18px; font-weight: 700; }
      .ip { font-size: 13px; fill: #374151; }
      .iface { font-size: 13px; font-weight: 700; fill: #374151; }
      .vlan { font-size: 13px; font-weight: 700; fill: #1d5a94; }
      .trunklabel { font-size: 14px; font-weight: 700; fill: #6d28d9; }
      .eclabel { font-size: 14px; font-weight: 700; fill: #b45309; }
      .sub2 { font-size: 12px; fill: #6b7280; }
      .legend { font-size: 13px; fill: #374151; }
    </style>
    <g id="pc">
      <rect x="-26" y="-24" width="52" height="36" rx="4" fill="#475569"/>
      <rect x="-21" y="-19" width="42" height="26" rx="2" fill="#bfdbfe"/>
      <rect x="-8" y="12" width="16" height="6" fill="#475569"/>
      <rect x="-18" y="18" width="36" height="5" rx="2" fill="#475569"/>
    </g>
    <g id="switch">
      <rect x="-55" y="-35" width="110" height="70" rx="10" fill="#0e9aa7"/>
      <rect x="-55" y="-35" width="110" height="70" rx="10" fill="none" stroke="#0b7a85" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
        <line x1="-34" y1="-11" x2="34" y2="-11"/>
        <line x1="-34" y1="11" x2="34" y2="11"/>
      </g>
      <g fill="#ffffff">
        <path d="M -34 -11 L -24 -17 L -24 -5 Z"/>
        <path d="M 34 -11 L 24 -17 L 24 -5 Z"/>
        <path d="M 34 11 L 24 5 L 24 17 Z"/>
        <path d="M -34 11 L -24 5 L -24 17 Z"/>
      </g>
    </g>
  </defs>

  <rect width="1200" height="860" fill="#ffffff"/>

  <text class="title" x="40" y="48">Day 9 ラボ: 冗長トライアングル構成 ― STP / EtherChannel 検証トポロジ</text>
  <text class="sub" x="40" y="74">スイッチ 3 台を三角形に接続した冗長構成。SW1-SW2 間はトランクに加え Fa0/1-2 を LACP で EtherChannel（Po1）化する</text>

  <!-- legend -->
  <g>
    <line x1="40" y1="96" x2="72" y2="96" stroke="#8b5cf6" stroke-width="5"/>
    <text class="legend" x="80" y="101">トランクリンク（802.1Q）</text>
    <line x1="300" y1="96" x2="332" y2="96" stroke="#ff9200" stroke-width="5"/>
    <text class="legend" x="340" y="101">EtherChannel（Po1・LACP active、Fa0/1-2 ×2）</text>
    <line x1="700" y1="96" x2="732" y2="96" stroke="#64748b" stroke-width="3"/>
    <text class="legend" x="740" y="101">アクセスポート（VLAN10）</text>
  </g>

  <!-- ================= links (drawn first, icons on top) ================= -->

  <!-- PC1 - SW1 (access, VLAN10) -->
  <line x1="600" y1="176" x2="600" y2="245" stroke="#64748b" stroke-width="3"/>

  <!-- SW3 - PC2 (access, VLAN10) -->
  <line x1="900" y1="595" x2="900" y2="664" stroke="#64748b" stroke-width="3"/>

  <!-- SW1 - SW3 trunk (Gi0/2 - Gi0/2) -->
  <line x1="632" y1="300" x2="868" y2="540" stroke="#8b5cf6" stroke-width="5"/>

  <!-- SW2 - SW3 trunk (Gi0/2 - Gi0/1) -->
  <line x1="355" y1="560" x2="845" y2="560" stroke="#8b5cf6" stroke-width="5"/>

  <!-- SW1 - SW2 trunk (Gi0/1 - Gi0/1) : offset toward lower-right of the pair -->
  <line x1="607" y1="308" x2="307" y2="548" stroke="#8b5cf6" stroke-width="5"/>

  <!-- SW1 - SW2 EtherChannel (Fa0/1-2 x2, Po1 trunk) : offset toward upper-left of the pair -->
  <line x1="580" y1="292" x2="280" y2="532" stroke="#ff9200" stroke-width="5" stroke-dasharray="14 6"/>

  <!-- ================= interface tags ================= -->
  <text class="iface" x="600" y="212" text-anchor="middle">Fa0/10</text>
  <text class="iface" x="912" y="612">Fa0/10</text>

  <text class="iface" x="648" y="318">Gi0/2</text>
  <text class="iface" x="855" y="528">Gi0/2</text>

  <text class="iface" x="390" y="605" text-anchor="middle">Gi0/2</text>
  <text class="iface" x="808" y="605" text-anchor="end">Gi0/1</text>

  <text class="iface" x="620" y="290" text-anchor="end">Gi0/1</text>
  <text class="iface" x="285" y="573">Gi0/1</text>

  <text class="iface" x="530" y="268" text-anchor="end">Fa0/1-2</text>
  <text class="iface" x="368" y="558">Fa0/1-2</text>

  <!-- link mid-labels -->
  <text class="trunklabel" x="770" y="405" text-anchor="middle">トランク</text>
  <text class="sub2" x="770" y="422" text-anchor="middle">許可VLAN 10（Native VLAN 既定）</text>

  <text class="trunklabel" x="600" y="590" text-anchor="middle">トランク（SW2 - SW3）</text>

  <text class="trunklabel" x="500" y="470" text-anchor="middle">トランク（Gi0/1 - Gi0/1）</text>

  <rect x="330" y="360" width="270" height="46" rx="8" fill="#fff7ed" stroke="#ff9200" stroke-width="2"/>
  <text class="eclabel" x="465" y="380" text-anchor="middle">EtherChannel Po1（LACP active）</text>
  <text class="sub2" x="465" y="398" text-anchor="middle" fill="#b45309">Fa0/1-2 ×2本を束ねてトランク化</text>

  <!-- ================= PC1 ================= -->
  <use href="#pc" x="600" y="150"/>
  <text class="devname" x="600" y="112" text-anchor="middle">PC1</text>
  <text class="ip" x="645" y="145">192.168.10.11/24</text>
  <text class="vlan" x="645" y="163">VLAN10（access）</text>

  <!-- ================= SW1 ================= -->
  <use href="#switch" x="600" y="280"/>
  <text class="devname" x="670" y="266">SW1（Catalyst 2960）</text>
  <text class="ip" x="670" y="288">VLAN10 mgmt 192.168.10.1/24</text>

  <!-- ================= SW2 ================= -->
  <use href="#switch" x="300" y="560"/>
  <text class="devname" x="230" y="546" text-anchor="end">SW2（Catalyst 2960）</text>
  <text class="ip" x="230" y="568" text-anchor="end">VLAN10 mgmt 192.168.10.2/24</text>

  <!-- ================= SW3 ================= -->
  <use href="#switch" x="900" y="560"/>
  <text class="devname" x="970" y="546">SW3（Catalyst 2960）</text>
  <text class="ip" x="970" y="568">VLAN10 mgmt 192.168.10.3/24</text>

  <!-- ================= PC2 ================= -->
  <use href="#pc" x="900" y="690"/>
  <text class="devname" x="900" y="746" text-anchor="middle">PC2</text>
  <text class="ip" x="900" y="766" text-anchor="middle">192.168.10.12/24</text>
  <text class="vlan" x="900" y="784" text-anchor="middle">VLAN10（access）</text>

  <!-- VLAN10 network note -->
  <rect x="40" y="130" width="230" height="46" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="vlan" x="60" y="152">VLAN10（DATA）</text>
  <text class="sub2" x="60" y="170">192.168.10.0/24</text>

  <!-- goal note -->
  <rect x="40" y="800" width="1120" height="48" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="60" y="822" font-size="14">ゴール: 3 台の冗長トライアングルで STP のルートブリッジ選出／ブロッキングポートを確認し、root primary で SW2 へ変更・RSTP 化・PortFast/BPDU Guard を設定。</text>
  <text x="60" y="840" font-size="14">SW1-SW2 間は LACP で Po1（EtherChannel）を構成し、Fa0/1 を落としても Po1 と通信が維持されることを確認する。</text>
</svg>
