<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 26px; font-weight: 700; }
      .sub { font-size: 15px; fill: #6b7280; }
      .area { font-size: 18px; font-weight: 700; }
      .devname { font-size: 17px; font-weight: 700; text-anchor: middle; }
      .info { font-size: 13px; text-anchor: middle; fill: #374151; }
      .linklabel { font-size: 13px; font-weight: 700; text-anchor: middle; fill: #475569; }
      .netlabel { font-size: 15px; font-weight: 700; text-anchor: start; }
      .ip { font-size: 13px; fill: #4b5563; text-anchor: middle; }
      .port { font-size: 11px; fill: #64748b; text-anchor: middle; }
      .link { stroke: #94a3b8; stroke-width: 3; }
      .goal { font-size: 14px; fill: #1e3a8a; }
    </style>
    <g id="router">
      <circle r="36" fill="#2779ca"/>
      <circle r="36" fill="none" stroke="#1e5f9e" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
        <line x1="-16" y1="-8" x2="8" y2="-8"/>
        <line x1="16" y1="8" x2="-8" y2="8"/>
      </g>
      <g fill="#ffffff">
        <path d="M 8 -14 L 20 -8 L 8 -2 Z"/>
        <path d="M -8 2 L -20 8 L -8 14 Z"/>
      </g>
    </g>
    <g id="switch">
      <rect x="-45" y="-30" width="90" height="60" rx="10" fill="#0e9aa7"/>
      <rect x="-45" y="-30" width="90" height="60" rx="10" fill="none" stroke="#0b7d89" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none">
        <line x1="-28" y1="-9" x2="10" y2="-9"/>
        <line x1="-10" y1="9" x2="28" y2="9"/>
      </g>
      <g fill="#ffffff">
        <path d="M 10 -14 L 22 -9 L 10 -4 Z"/>
        <path d="M -28 -14 L -40 -9 L -28 -4 Z"/>
        <path d="M 28 4 L 40 9 L 28 14 Z"/>
        <path d="M -10 4 L -22 9 L -10 14 Z"/>
      </g>
    </g>
    <g id="pc">
      <rect x="-26" y="-24" width="52" height="36" rx="4" fill="#475569"/>
      <rect x="-21" y="-19" width="42" height="26" rx="2" fill="#bfdbfe"/>
      <rect x="-8" y="12" width="16" height="6" fill="#475569"/>
      <rect x="-18" y="18" width="36" height="5" rx="2" fill="#475569"/>
    </g>
  </defs>

  <rect width="1200" height="1180" fill="#ffffff"/>

  <text class="title" x="40" y="50">Day 8 ラボ: VLAN 間ルーティング 完成トポロジ</text>
  <text class="sub" x="40" y="78">Part1: Router-on-a-Stick と Part2: L3 スイッチ + SVI — いずれも VLAN10・VLAN20 間の疎通を実現する</text>

  <!-- ============ Part1 ============ -->
  <rect x="40" y="100" width="1120" height="465" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text class="area" x="64" y="132" fill="#2779ca">Part1: Router-on-a-Stick</text>

  <!-- Router -->
  <text class="devname" x="230" y="155">R1（2911）</text>
  <text class="info" x="230" y="178">Gi0/0.10 = 192.168.10.1</text>
  <text class="info" x="230" y="196">Gi0/0.20 = 192.168.20.1</text>
  <use href="#router" x="230" y="250"/>

  <!-- Switch -->
  <text class="devname" x="600" y="155">SW1（2960）</text>
  <text class="info" x="600" y="196">Fa0/24 = トランクポート</text>
  <use href="#switch" x="600" y="250"/>

  <!-- Router-Switch trunk link -->
  <line class="link" x1="266" y1="250" x2="555" y2="250"/>
  <text class="linklabel" x="411" y="233">トランク(802.1Q): Gi0/0 ⟷ Fa0/24</text>

  <!-- trunk from switch down to the VLAN split point -->
  <line class="link" x1="600" y1="280" x2="600" y2="345"/>

  <!-- VLAN10 group -->
  <rect x="140" y="345" width="420" height="200" rx="14" fill="#eff6ff" stroke="#2779ca" stroke-width="2" stroke-dasharray="8 6"/>
  <text class="netlabel" x="160" y="371" fill="#2779ca">VLAN10（SALES）192.168.10.0/24</text>

  <line class="link" x1="600" y1="345" x2="270" y2="421"/>
  <line class="link" x1="600" y1="345" x2="460" y2="421"/>
  <use href="#pc" x="270" y="445"/>
  <text class="devname" x="270" y="505">PC1</text>
  <text class="ip" x="270" y="525">192.168.10.11/24</text>
  <use href="#pc" x="460" y="445"/>
  <text class="devname" x="460" y="505">PC2</text>
  <text class="ip" x="460" y="525">192.168.10.12/24</text>
  <text class="port" x="319" y="405">Fa0/1</text>
  <text class="port" x="481" y="405">Fa0/2</text>

  <!-- VLAN20 group -->
  <rect x="620" y="345" width="420" height="200" rx="14" fill="#fff7ed" stroke="#ff9200" stroke-width="2" stroke-dasharray="8 6"/>
  <text class="netlabel" x="1020" y="371" style="text-anchor: end" fill="#c2570c">VLAN20（DEV）192.168.20.0/24</text>

  <line class="link" x1="600" y1="345" x2="760" y2="421"/>
  <line class="link" x1="600" y1="345" x2="940" y2="421"/>
  <use href="#pc" x="760" y="445"/>
  <text class="devname" x="760" y="505">PC3</text>
  <text class="ip" x="760" y="525">192.168.20.11/24</text>
  <use href="#pc" x="940" y="445"/>
  <text class="devname" x="940" y="505">PC4</text>
  <text class="ip" x="940" y="525">192.168.20.12/24</text>
  <text class="port" x="736" y="405">Fa0/3</text>
  <text class="port" x="889" y="405">Fa0/4</text>

  <!-- ============ Part2 ============ -->
  <rect x="40" y="585" width="1120" height="465" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text class="area" x="64" y="617" fill="#8b5cf6">Part2: L3 スイッチ + SVI</text>

  <!-- MLS -->
  <text class="devname" x="600" y="640">MLS（3560）</text>
  <text class="info" x="600" y="663">Vlan10 SVI = 192.168.10.1</text>
  <text class="info" x="600" y="681">Vlan20 SVI = 192.168.20.1</text>
  <use href="#switch" x="600" y="735"/>
  <circle cx="640" cy="710" r="15" fill="#8b5cf6"/>
  <text x="640" y="715" font-size="12" font-weight="700" text-anchor="middle" fill="#ffffff">L3</text>

  <!-- trunk from MLS down to the VLAN split point -->
  <line class="link" x1="600" y1="765" x2="600" y2="830"/>

  <!-- VLAN10 group -->
  <rect x="140" y="830" width="420" height="200" rx="14" fill="#eff6ff" stroke="#2779ca" stroke-width="2" stroke-dasharray="8 6"/>
  <text class="netlabel" x="160" y="856" fill="#2779ca">VLAN10（SALES）192.168.10.0/24</text>

  <line class="link" x1="600" y1="830" x2="270" y2="906"/>
  <line class="link" x1="600" y1="830" x2="460" y2="906"/>
  <use href="#pc" x="270" y="930"/>
  <text class="devname" x="270" y="990">PC1</text>
  <text class="ip" x="270" y="1010">192.168.10.11/24</text>
  <use href="#pc" x="460" y="930"/>
  <text class="devname" x="460" y="990">PC2</text>
  <text class="ip" x="460" y="1010">192.168.10.12/24</text>
  <text class="port" x="319" y="890">Fa0/1</text>
  <text class="port" x="481" y="890">Fa0/2</text>

  <!-- VLAN20 group -->
  <rect x="620" y="830" width="420" height="200" rx="14" fill="#fff7ed" stroke="#ff9200" stroke-width="2" stroke-dasharray="8 6"/>
  <text class="netlabel" x="1020" y="856" style="text-anchor: end" fill="#c2570c">VLAN20（DEV）192.168.20.0/24</text>

  <line class="link" x1="600" y1="830" x2="760" y2="906"/>
  <line class="link" x1="600" y1="830" x2="940" y2="906"/>
  <use href="#pc" x="760" y="930"/>
  <text class="devname" x="760" y="990">PC3</text>
  <text class="ip" x="760" y="1010">192.168.20.11/24</text>
  <use href="#pc" x="940" y="930"/>
  <text class="devname" x="940" y="990">PC4</text>
  <text class="ip" x="940" y="1010">192.168.20.12/24</text>
  <text class="port" x="736" y="890">Fa0/3</text>
  <text class="port" x="889" y="890">Fa0/4</text>

  <!-- Goal note -->
  <rect x="40" y="1070" width="1120" height="80" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="goal" x="60" y="1096">🎯 ゴール: 両方式（Router-on-a-Stick / L3スイッチ+SVI）で VLAN10・VLAN20 間の ping がすべて成功し、</text>
  <text class="goal" x="60" y="1118">show ip route に 192.168.10.0/24 と 192.168.20.0/24 が C（接続）経路として表示されることを確認する</text>
</svg>
