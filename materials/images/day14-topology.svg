<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="800" viewBox="0 0 1300 800">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 25px; font-weight: 700; }
      .sub { font-size: 15px; fill: #6b7280; }
      .legend { font-size: 13px; fill: #6b7280; }
      .devname { font-size: 17px; font-weight: 700; text-anchor: middle; }
      .devsub { font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .iface { font-size: 13px; font-weight: 700; fill: #374151; text-anchor: middle; }
      .net { font-size: 15px; font-weight: 700; fill: #b45309; text-anchor: middle; }
      .ip { font-size: 13px; fill: #4b5563; text-anchor: middle; }
      .badge-in { font-size: 12px; font-weight: 700; fill: #5b7a00; text-anchor: middle; }
      .badge-out { font-size: 12px; font-weight: 700; fill: #c2660a; text-anchor: middle; }
      .link { stroke: #94a3b8; stroke-width: 3; }
    </style>
    <g id="router">
      <circle r="36" fill="#2779ca"/>
      <circle r="36" fill="none" stroke="#1e5f9e" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
        <line x1="-16" y1="-8" x2="8" y2="-8"/>
        <line x1="16" y1="8" x2="-8" y2="8"/>
      </g>
      <g fill="#ffffff">
        <path d="M 8 -14 L 20 -8 L 8 -2 Z"/>
        <path d="M -8 2 L -20 8 L -8 14 Z"/>
      </g>
    </g>
    <g id="pc">
      <rect x="-26" y="-24" width="52" height="36" rx="4" fill="#475569"/>
      <rect x="-21" y="-19" width="42" height="26" rx="2" fill="#bfdbfe"/>
      <rect x="-8" y="12" width="16" height="6" fill="#475569"/>
      <rect x="-18" y="18" width="36" height="5" rx="2" fill="#475569"/>
    </g>
    <g id="switch">
      <rect x="-55" y="-35" width="110" height="70" rx="10" fill="#0e9aa7"/>
      <rect x="-55" y="-35" width="110" height="70" rx="10" fill="none" stroke="#0b7a85" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
        <line x1="-34" y1="-11" x2="34" y2="-11"/>
        <line x1="-34" y1="11" x2="34" y2="11"/>
      </g>
      <g fill="#ffffff">
        <path d="M -34 -11 L -24 -17 L -24 -5 Z"/>
        <path d="M 34 -11 L 24 -17 L 24 -5 Z"/>
        <path d="M 34 11 L 24 5 L 24 17 Z"/>
        <path d="M -34 11 L -24 5 L -24 17 Z"/>
      </g>
    </g>
    <g id="server">
      <rect x="-22" y="-37" width="44" height="74" rx="4" fill="#374151"/>
      <rect x="-22" y="-37" width="44" height="74" rx="4" fill="none" stroke="#1f2937" stroke-width="2"/>
      <g stroke="#9ca3af" stroke-width="3" stroke-linecap="round">
        <line x1="-14" y1="-21" x2="14" y2="-21"/>
        <line x1="-14" y1="-5" x2="14" y2="-5"/>
        <line x1="-14" y1="11" x2="14" y2="11"/>
      </g>
      <circle cx="10" cy="27" r="3" fill="#4ade80"/>
    </g>
  </defs>

  <rect width="1300" height="800" fill="#ffffff"/>

  <text class="title" x="40" y="50">Day 14 ラボ: 静的 NAT・動的 NAT・PAT 構成トポロジ</text>
  <text class="sub" x="40" y="78">PC1〜PC3（内部）→ SW1 → R1（NAT 変換ルータ）→ R2（ISP 役）→ Srv1（外部 Web サーバ）</text>
  <text class="legend" x="40" y="102">★ inside = R1 の「ip nat inside」指定インターフェース／★ outside = R1 の「ip nat outside」指定インターフェース</text>

  <!-- ================= links ================= -->
  <line class="link" x1="110" y1="280" x2="330" y2="420"/>
  <line class="link" x1="110" y1="420" x2="330" y2="420"/>
  <line class="link" x1="110" y1="560" x2="330" y2="420"/>
  <line class="link" x1="330" y1="420" x2="610" y2="420"/>
  <line class="link" x1="610" y1="420" x2="900" y2="420"/>
  <line class="link" x1="900" y1="420" x2="1170" y2="420"/>

  <!-- PC - SW1 port labels -->
  <text class="iface" x="222" y="356">Fa0/1</text>
  <text class="iface" x="222" y="404">Fa0/2</text>
  <text class="iface" x="222" y="466">Fa0/3</text>

  <!-- SW1 - R1 segment -->
  <text class="net" x="470" y="200">192.168.1.0/24</text>
  <text class="ip"  x="470" y="220">LAN（PC1〜PC3 の GW: 192.168.1.1）</text>
  <text class="iface" x="400" y="300">Fa0/24</text>
  <text class="iface" x="540" y="300">Gi0/0</text>
  <text class="badge-in" x="540" y="318">★ inside</text>

  <!-- R1 - R2 segment (WAN) -->
  <text class="net" x="755" y="200">203.0.113.0/24</text>
  <text class="ip"  x="755" y="220">R1: 203.0.113.1 ／ R2: 203.0.113.2</text>
  <text class="iface" x="675" y="300">Gi0/1</text>
  <text class="badge-out" x="675" y="318">★ outside</text>
  <text class="iface" x="835" y="300">Gi0/1</text>

  <!-- R2 - Srv1 segment -->
  <text class="net" x="1035" y="200">198.51.100.0/24</text>
  <text class="ip"  x="1035" y="220">R2: 198.51.100.1 ／ Srv1: 198.51.100.8</text>
  <text class="iface" x="965" y="300">Gi0/0</text>
  <text class="iface" x="1108" y="300">FastEthernet0</text>

  <!-- ================= devices ================= -->
  <use href="#pc" x="110" y="280"/>
  <text class="devname" x="110" y="332">PC1</text>
  <text class="ip" x="110" y="350">192.168.1.10/24</text>

  <use href="#pc" x="110" y="420"/>
  <text class="devname" x="110" y="472">PC2</text>
  <text class="ip" x="110" y="490">192.168.1.11/24</text>

  <use href="#pc" x="110" y="560"/>
  <text class="devname" x="110" y="612">PC3</text>
  <text class="ip" x="110" y="630">192.168.1.12/24</text>

  <use href="#switch" x="330" y="420"/>
  <text class="devname" x="330" y="345">SW1</text>
  <text class="devsub" x="330" y="478">(2960)・L2スイッチ設定不要</text>

  <use href="#router" x="610" y="420"/>
  <text class="devname" x="610" y="345">R1</text>
  <text class="devsub" x="610" y="363">(2911) NAT 変換ルータ</text>

  <use href="#router" x="900" y="420"/>
  <text class="devname" x="900" y="345">R2</text>
  <text class="devsub" x="900" y="363">(2911) ISP 役</text>

  <use href="#server" x="1170" y="420"/>
  <text class="devname" x="1170" y="345">Srv1</text>
  <text class="devsub" x="1170" y="363">外部 Web サーバ役</text>
  <text class="ip" x="1170" y="480">198.51.100.8/24</text>
  <text class="ip" x="1170" y="498">GW: 198.51.100.1</text>

  <!-- goal note -->
  <rect x="40" y="710" width="1220" height="66" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="60" y="736" font-size="15">ゴール: R1 上で静的 NAT・動的 NAT・PAT（NAT Overload）を順に構成し、内部ホストから 198.51.100.8 へ ping が通ること</text>
  <text x="60" y="758" font-size="15">を確認する。あわせて show ip nat translations／show ip nat statistics で 3 方式の変換テーブルの違いを観察する。</text>
</svg>
