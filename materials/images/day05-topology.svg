<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 26px; font-weight: 700; }
      .sub { font-size: 15px; fill: #6b7280; }
      .devname { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .model { font-size: 13px; text-anchor: middle; fill: #6b7280; }
      .iface { font-size: 13px; font-weight: 700; fill: #0e9aa7; }
      .ip { font-size: 13px; fill: #4b5563; text-anchor: middle; }
      .net { font-size: 15px; font-weight: 700; fill: #1d4ed8; }
      .linklabel { font-size: 13px; font-weight: 700; fill: #374151; text-anchor: middle; }
      .linknote { font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .link { stroke: #94a3b8; stroke-width: 3; }
      .trunk { stroke: #0e9aa7; stroke-width: 5; }
    </style>
    <g id="pc">
      <rect x="-26" y="-24" width="52" height="36" rx="4" fill="#475569"/>
      <rect x="-21" y="-19" width="42" height="26" rx="2" fill="#bfdbfe"/>
      <rect x="-8" y="12" width="16" height="6" fill="#475569"/>
      <rect x="-18" y="18" width="36" height="5" rx="2" fill="#475569"/>
    </g>
    <g id="switch">
      <rect x="-48" y="-30" width="96" height="60" rx="10" fill="#0e9aa7"/>
      <rect x="-48" y="-30" width="96" height="60" rx="10" fill="none" stroke="#0b7a85" stroke-width="2.5"/>
      <line x1="-30" y1="-11" x2="30" y2="-11" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M -30 -11 L -21 -17 L -21 -5 Z" fill="#ffffff"/>
      <path d="M 30 -11 L 21 -17 L 21 -5 Z" fill="#ffffff"/>
      <line x1="-30" y1="11" x2="30" y2="11" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M -30 11 L -21 5 L -21 17 Z" fill="#ffffff"/>
      <path d="M 30 11 L 21 5 L 21 17 Z" fill="#ffffff"/>
    </g>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>

  <text class="title" x="40" y="52">Day 5 ラボ: 完成トポロジ</text>
  <text class="sub" x="40" y="80">スイッチ 2 台（2960）・PC 4 台 ／ MAC アドレステーブルと ARP の学習、Gi0/1 のデュプレックス不一致切り分け</text>

  <!-- Subnet area -->
  <rect x="40" y="102" width="1120" height="560" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text class="net" x="66" y="134">ネットワークアドレス: 192.168.10.0/24（全ノード共通サブネット・デフォルトゲートウェイ不要）</text>

  <!-- PC-SW connecting links -->
  <line class="link" x1="238" y1="200" x2="384" y2="356"/>
  <line class="link" x1="238" y1="560" x2="384" y2="404"/>
  <line class="link" x1="962" y1="200" x2="816" y2="356"/>
  <line class="link" x1="962" y1="560" x2="816" y2="404"/>

  <!-- inter-switch trunk-style link -->
  <line class="trunk" x1="478" y1="380" x2="722" y2="380"/>

  <!-- interface labels near switches -->
  <text class="iface" x="356" y="322">Fa0/1</text>
  <text class="iface" x="356" y="440">Fa0/2</text>
  <text class="iface" x="844" y="322" text-anchor="end">Fa0/1</text>
  <text class="iface" x="844" y="440" text-anchor="end">Fa0/2</text>

  <!-- inter-switch link labels -->
  <text class="linklabel" x="500" y="366">Gi0/1</text>
  <text class="linklabel" x="700" y="366">Gi0/1</text>
  <text class="linklabel" x="600" y="405">スイッチ間リンク</text>
  <text class="linknote" x="600" y="423">ストレートケーブル（Auto-MDIX）</text>

  <!-- SW1 -->
  <use href="#switch" x="430" y="380"/>
  <text class="devname" x="430" y="300">SW1</text>
  <text class="model" x="430" y="320">Catalyst 2960</text>

  <!-- SW2 -->
  <use href="#switch" x="770" y="380"/>
  <text class="devname" x="770" y="300">SW2</text>
  <text class="model" x="770" y="320">Catalyst 2960</text>

  <!-- PC1 -->
  <use href="#pc" x="220" y="190"/>
  <text class="devname" x="220" y="248">PC1</text>
  <text class="ip" x="220" y="268">192.168.10.11 /24</text>

  <!-- PC2 -->
  <use href="#pc" x="220" y="570"/>
  <text class="devname" x="220" y="500">PC2</text>
  <text class="ip" x="220" y="520">192.168.10.12 /24</text>

  <!-- PC3 -->
  <use href="#pc" x="980" y="190"/>
  <text class="devname" x="980" y="248">PC3</text>
  <text class="ip" x="980" y="268">192.168.10.13 /24</text>

  <!-- PC4 -->
  <use href="#pc" x="980" y="570"/>
  <text class="devname" x="980" y="500">PC4</text>
  <text class="ip" x="980" y="520">192.168.10.14 /24</text>

  <!-- goal note -->
  <rect x="40" y="680" width="1120" height="56" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="60" y="705" font-size="14">ゴール: シミュレーションモードで ARP（Request=ブロードキャスト／Reply=ユニキャスト）とスイッチの MAC</text>
  <text x="60" y="726" font-size="14">アドレス学習の流れを観察し、Gi0/1 で発生させたデュプレックス／速度不一致を show interfaces 系コマンドで切り分け・復旧できる。</text>
</svg>
