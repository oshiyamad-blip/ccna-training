<!doctype html><html><head><meta charset="utf-8"><style>body{margin:0}</style></head><body><svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 24px; font-weight: 700; }
      .sub { font-size: 14px; fill: #6b7280; }
      .ruler { font-size: 14px; font-weight: 700; fill: #374151; text-anchor: middle; }
      .badge { font-size: 13px; font-weight: 700; }
      .segName { font-size: 17px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .segNameDark { font-size: 15px; font-weight: 700; fill: #374151; text-anchor: middle; }
      .segRange { font-size: 12px; fill: #ffffff; text-anchor: middle; }
      .segRangeDark { font-size: 11px; fill: #4b5563; text-anchor: middle; }
      .calloutTitle { font-size: 14px; font-weight: 700; }
      .calloutSub { font-size: 12px; fill: #4b5563; }
      .edge { font-size: 12px; fill: #6b7280; }
      .leader { stroke: #9ca3af; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect width="1100" height="560" fill="#ffffff"/>

  <text class="title" x="50" y="50">VLSM 設計の考え方: 大きいブロックから連続して割り当てる</text>
  <text class="sub" x="50" y="78">設計例（講義本文）: 203.0.113.0/24 を、必要ホスト数の多い順に 4 部門へ割り当てる</text>

  <!-- ruler across whole /24 -->
  <line x1="100" y1="160" x2="1000" y2="160" stroke="#9ca3af" stroke-width="2"/>
  <line x1="100" y1="153" x2="100" y2="167" stroke="#9ca3af" stroke-width="2"/>
  <line x1="1000" y1="153" x2="1000" y2="167" stroke="#9ca3af" stroke-width="2"/>
  <text class="ruler" x="550" y="140">203.0.113.0/24 ＝ 256 個のアドレス空間</text>

  <!-- badges above bar -->
  <text class="badge" x="325" y="210" text-anchor="middle" fill="#1d4ed8">営業部 /25</text>
  <text class="badge" x="662.5" y="210" text-anchor="middle" fill="#4d7c0f">サポート部 /26</text>
  <text class="badge" x="795" y="210" text-anchor="end" fill="#6d28d9">プリンタ /28</text>
  <text class="badge" x="845" y="210" text-anchor="start" fill="#c2620a">WAN /30</text>
  <text class="badge" x="922.6" y="210" text-anchor="middle" fill="#6b7280">未使用</text>
  <path class="leader" d="M 795 214 L 803 230"/>
  <path class="leader" d="M 845 214 L 838.3 230"/>

  <!-- the block bar (clipped for rounded outer corners) -->
  <clipPath id="barClip">
    <rect x="100" y="230" width="900" height="90" rx="14"/>
  </clipPath>
  <g clip-path="url(#barClip)">
    <rect x="100"    y="230" width="450"    height="90" fill="#2779ca"/>
    <rect x="550"    y="230" width="225"    height="90" fill="#7ea800"/>
    <rect x="775"    y="230" width="56.25"  height="90" fill="#8b5cf6"/>
    <rect x="831.25" y="230" width="14.06"  height="90" fill="#ff9200"/>
    <rect x="845.31" y="230" width="154.69" height="90" fill="#dbe1e8"/>
  </g>
  <rect x="100" y="230" width="900" height="90" rx="14" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- separators -->
  <line x1="550"    y1="230" x2="550"    y2="320" stroke="#ffffff" stroke-width="2"/>
  <line x1="775"    y1="230" x2="775"    y2="320" stroke="#ffffff" stroke-width="2"/>
  <line x1="831.25" y1="230" x2="831.25" y2="320" stroke="#ffffff" stroke-width="2"/>
  <line x1="845.31" y1="230" x2="845.31" y2="320" stroke="#ffffff" stroke-width="2"/>

  <!-- inside-bar labels: 営業部 -->
  <text class="segName" x="325" y="272">.0〜.127</text>
  <text class="segRange" x="325" y="294">128 個（有効ホスト 126・要件100台）</text>

  <!-- inside-bar labels: サポート部 -->
  <text class="segName" x="662.5" y="272">.128〜.191</text>
  <text class="segRange" x="662.5" y="294">64 個（有効ホスト 62・要件50台）</text>

  <!-- inside-bar labels: 未使用 -->
  <text class="segNameDark" x="922.6" y="270">.212〜.255</text>
  <text class="segRangeDark" x="922.6" y="288">44 個（将来の拡張用）</text>

  <!-- edge addresses -->
  <text class="edge" x="100" y="345">203.0.113.0</text>
  <text class="edge" x="1000" y="345" text-anchor="end">203.0.113.255</text>

  <!-- external callout: プリンタ -->
  <path class="leader" d="M 803.1 320 L 803.1 345 L 700 375"/>
  <text class="calloutTitle" x="640" y="393" fill="#6d28d9">プリンタ用（/28）</text>
  <text class="calloutSub" x="640" y="411">.192〜.207（16 個・有効ホスト14・要件10台）</text>

  <!-- external callout: WAN -->
  <path class="leader" d="M 838.3 320 L 838.3 345 L 945 375"/>
  <text class="calloutTitle" x="945" y="393" fill="#c2620a">WAN リンク（/30）</text>
  <text class="calloutSub" x="945" y="411">.208〜.211（4 個・有効ホスト2・要件2台）</text>

  <!-- takeaway note -->
  <rect x="50" y="450" width="1000" height="86" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="70" y="478" font-size="14">鉄則: ① 必要ホスト数が多い順に、大きいブロックから確保する　② 割り当てたブロックの直後から次のブロックを連続配置する</text>
  <text x="70" y="500" font-size="14">③ ブロック同士が重ならない（オーバーラップしない）ことを確認する　→ 均等に割ると小規模部門にも無駄な余りが生まれる</text>
  <text x="70" y="522" font-size="13" fill="#6b7280">図の面積比はそのままアドレス数の比（/25=128個 が最大、/30=4個が最小）。「多い順→連続配置→重複なし」が VLSM 設計の核心。</text>
</svg></body></html>
