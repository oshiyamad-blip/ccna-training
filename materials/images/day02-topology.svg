<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="830" viewBox="0 0 1200 830">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 26px; font-weight: 700; }
      .sub { font-size: 15px; fill: #6b7280; }
      .area { font-size: 16px; font-weight: 700; fill: #1d4ed8; }
      .devname { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .devname-admin { font-size: 18px; font-weight: 700; text-anchor: middle; fill: #c2410c; }
      .iface { font-size: 13px; fill: #374151; text-anchor: middle; }
      .ip { font-size: 13px; fill: #4b5563; text-anchor: middle; }
      .link { stroke: #94a3b8; stroke-width: 3; }
      .goal { font-size: 14.5px; fill: #1f2937; }
    </style>
    <g id="router">
      <circle r="36" fill="#2779ca"/>
      <circle r="36" fill="none" stroke="#1e5f9e" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
        <line x1="-16" y1="-8" x2="8" y2="-8"/>
        <line x1="16" y1="8" x2="-8" y2="8"/>
      </g>
      <g fill="#ffffff">
        <path d="M 8 -14 L 20 -8 L 8 -2 Z"/>
        <path d="M -8 2 L -20 8 L -8 14 Z"/>
      </g>
    </g>
    <g id="switch">
      <rect x="-35" y="-22" width="70" height="44" rx="8" fill="#0e9aa7"/>
      <rect x="-35" y="-22" width="70" height="44" rx="8" fill="none" stroke="#0b7480" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" fill="#ffffff">
        <line x1="-22" y1="-7" x2="9" y2="-7"/>
        <path d="M 9 -7 L 3 -11 L 3 -3 Z"/>
        <path d="M -22 -7 L -16 -11 L -16 -3 Z"/>
        <line x1="-9" y1="8" x2="22" y2="8"/>
        <path d="M 22 8 L 16 4 L 16 12 Z"/>
        <path d="M -9 8 L -15 4 L -15 12 Z"/>
      </g>
    </g>
    <g id="pc">
      <rect x="-26" y="-24" width="52" height="36" rx="4" fill="#475569"/>
      <rect x="-21" y="-19" width="42" height="26" rx="2" fill="#bfdbfe"/>
      <rect x="-8" y="12" width="16" height="6" fill="#475569"/>
      <rect x="-18" y="18" width="36" height="5" rx="2" fill="#475569"/>
    </g>
  </defs>

  <rect width="1200" height="830" fill="#ffffff"/>

  <text class="title" x="40" y="50">Day 2 ラボ: 完成トポロジ ― IOS 初期設定と SSH 管理</text>
  <text class="sub" x="40" y="78">R1・SW1・SW2 に管理設定を行い、Admin-PC から SSH でリモート管理できる状態を作る</text>

  <!-- 管理サブネット全体を囲む -->
  <rect x="50" y="100" width="1100" height="610" rx="24" fill="#f8fafc" stroke="#2779ca" stroke-width="2.5" stroke-dasharray="10 7"/>
  <text class="area" x="75" y="134">192.168.1.0/24 ・ VLAN 1（管理サブネット）</text>

  <!-- links -->
  <line class="link" x1="200" y1="300" x2="520" y2="300"/>
  <line class="link" x1="520" y1="300" x2="900" y2="170"/>
  <line class="link" x1="520" y1="300" x2="900" y2="430"/>
  <line class="link" x1="520" y1="300" x2="520" y2="610"/>
  <line class="link" x1="520" y1="610" x2="900" y2="610"/>

  <!-- link labels -->
  <text class="iface" x="360" y="284">Gi0/0 ⟷ Fa0/24</text>
  <text class="iface" x="660" y="250">Fa0/1</text>
  <text class="iface" x="660" y="378">Fa0/2</text>
  <text class="iface" x="590" y="450">Fa0/23</text>
  <text class="iface" x="590" y="468">⟷ Fa0/23</text>
  <text class="iface" x="710" y="594">Fa0/1</text>

  <!-- R1 -->
  <use href="#router" x="200" y="300"/>
  <text class="devname" x="200" y="245">R1</text>
  <text class="ip" x="200" y="355">Gi0/0: 192.168.1.1/24</text>

  <!-- SW1 -->
  <use href="#switch" x="520" y="300"/>
  <text class="devname" x="520" y="255">SW1</text>
  <text class="ip" x="520" y="345">VLAN1(SVI): 192.168.1.11/24</text>
  <text class="ip" x="520" y="363">GW: 192.168.1.1</text>

  <!-- SW2 -->
  <use href="#switch" x="520" y="610"/>
  <text class="devname" x="520" y="565">SW2</text>
  <text class="ip" x="520" y="655">VLAN1(SVI): 192.168.1.12/24</text>
  <text class="ip" x="520" y="673">GW: 192.168.1.1</text>

  <!-- PC1 -->
  <use href="#pc" x="900" y="170"/>
  <text class="devname" x="900" y="125">PC1</text>
  <text class="ip" x="900" y="215">192.168.1.101/24</text>
  <text class="ip" x="900" y="233">GW: 192.168.1.1</text>

  <!-- Admin-PC -->
  <use href="#pc" x="900" y="430"/>
  <text class="devname-admin" x="900" y="385">Admin-PC</text>
  <text class="ip" x="900" y="475">192.168.1.100/24</text>
  <text class="ip" x="900" y="493">GW: 192.168.1.1</text>

  <!-- PC2 -->
  <use href="#pc" x="900" y="610"/>
  <text class="devname" x="900" y="565">PC2</text>
  <text class="ip" x="900" y="655">192.168.1.102/24</text>
  <text class="ip" x="900" y="673">GW: 192.168.1.1</text>

  <!-- goal note -->
  <rect x="50" y="730" width="1100" height="76" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="goal" x="70" y="758">ゴール: R1・SW1・SW2 にホスト名／enable secret／管理 IP を設定し、SSHv2 のみを許可（Telnet 排除）。</text>
  <text class="goal" x="70" y="780">Admin-PC から SSH でログインし、設定を startup-config に保存・検証できること。</text>
</svg>
