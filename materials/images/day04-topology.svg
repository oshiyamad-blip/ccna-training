<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 26px; font-weight: 700; }
      .sub { font-size: 15px; fill: #6b7280; }
      .devname { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .iface { font-size: 12.5px; fill: #374151; text-anchor: middle; }
      .ip { font-size: 13px; fill: #4b5563; text-anchor: middle; }
      .note { font-size: 11.5px; fill: #6b7280; text-anchor: middle; }
      .area-blue { font-size: 16px; font-weight: 700; fill: #1d4ed8; }
      .area-green { font-size: 16px; font-weight: 700; fill: #3f6212; }
      .hdr { font-size: 13px; fill: #374151; }
      .link { stroke: #94a3b8; stroke-width: 3; }
      .goal { font-size: 14.5px; fill: #1f2937; }
    </style>
    <g id="router">
      <circle r="36" fill="#2779ca"/>
      <circle r="36" fill="none" stroke="#1e5f9e" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
        <line x1="-16" y1="-8" x2="8" y2="-8"/>
        <line x1="16" y1="8" x2="-8" y2="8"/>
      </g>
      <g fill="#ffffff">
        <path d="M 8 -14 L 20 -8 L 8 -2 Z"/>
        <path d="M -8 2 L -20 8 L -8 14 Z"/>
      </g>
    </g>
    <g id="switch">
      <rect x="-35" y="-22" width="70" height="44" rx="8" fill="#0e9aa7"/>
      <rect x="-35" y="-22" width="70" height="44" rx="8" fill="none" stroke="#0b7480" stroke-width="2.5"/>
      <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" fill="#ffffff">
        <line x1="-22" y1="-7" x2="9" y2="-7"/>
        <path d="M 9 -7 L 3 -11 L 3 -3 Z"/>
        <path d="M -22 -7 L -16 -11 L -16 -3 Z"/>
        <line x1="-9" y1="8" x2="22" y2="8"/>
        <path d="M 22 8 L 16 4 L 16 12 Z"/>
        <path d="M -9 8 L -15 4 L -15 12 Z"/>
      </g>
    </g>
    <g id="pc">
      <rect x="-26" y="-24" width="52" height="36" rx="4" fill="#475569"/>
      <rect x="-21" y="-19" width="42" height="26" rx="2" fill="#bfdbfe"/>
      <rect x="-8" y="12" width="16" height="6" fill="#475569"/>
      <rect x="-18" y="18" width="36" height="5" rx="2" fill="#475569"/>
    </g>
  </defs>

  <rect width="1200" height="800" fill="#ffffff"/>

  <text class="title" x="40" y="46">Day 4 ラボ: 完成トポロジ ― IPv6 静的設定と SLAAC の構成</text>
  <text class="sub" x="40" y="74">R1 (2911) の2つのセグメントで、静的アドレス設定（左）と SLAAC 自動設定（右）を比較する</text>

  <!-- router links (drawn first, under everything) -->
  <line class="link" x1="600" y1="150" x2="320" y2="400"/>
  <line class="link" x1="600" y1="150" x2="880" y2="400"/>

  <!-- segment boxes -->
  <rect x="50" y="230" width="520" height="430" rx="24" fill="#eff6ff" stroke="#2779ca" stroke-width="2.5" stroke-dasharray="10 7"/>
  <rect x="630" y="230" width="520" height="430" rx="24" fill="#f1f6e3" stroke="#7ea800" stroke-width="2.5" stroke-dasharray="10 7"/>

  <text class="area-blue" x="75" y="262">静的セグメント</text>
  <text class="hdr" x="75" y="286">ネットワーク: 2001:DB8:0:1::/64</text>
  <text class="hdr" x="75" y="306">R1 Gi0/0: 2001:DB8:0:1::1/64</text>

  <text class="area-green" x="655" y="262">SLAAC セグメント</text>
  <text class="hdr" x="655" y="286">ネットワーク: 2001:DB8:0:2::/64</text>
  <text class="hdr" x="655" y="306">R1 Gi0/1: 2001:DB8:0:2::/64（EUI-64 自動生成）</text>

  <!-- interface tags on router links -->
  <text class="iface" x="516" y="215">Gi0/0</text>
  <text class="iface" x="684" y="215">Gi0/1</text>
  <text class="iface" x="424" y="332">⟷ Fa0/1</text>
  <text class="iface" x="776" y="332">⟷ Fa0/1</text>

  <!-- SW1 -->
  <use href="#switch" x="320" y="400"/>
  <text class="devname" x="320" y="350">SW1（2960）</text>
  <text class="note" x="320" y="366">VLAN 1・既定のアクセスポート</text>

  <!-- SW2 -->
  <use href="#switch" x="880" y="400"/>
  <text class="devname" x="880" y="350">SW2（2960）</text>
  <text class="note" x="880" y="366">VLAN 1・既定のアクセスポート</text>

  <!-- switch-PC links -->
  <line class="link" x1="320" y1="400" x2="190" y2="560"/>
  <line class="link" x1="320" y1="400" x2="450" y2="560"/>
  <line class="link" x1="880" y1="400" x2="750" y2="560"/>
  <line class="link" x1="880" y1="400" x2="1010" y2="560"/>

  <text class="iface" x="234" y="460">Fa0/2</text>
  <text class="iface" x="410" y="460">Fa0/3</text>
  <text class="iface" x="794" y="460">Fa0/2</text>
  <text class="iface" x="966" y="460">Fa0/3</text>

  <!-- Router -->
  <use href="#router" x="600" y="150"/>
  <text class="devname" x="600" y="100">R1（2911）</text>

  <!-- PC1 -->
  <use href="#pc" x="190" y="560"/>
  <text class="devname" x="190" y="510">PC1（静的）</text>
  <text class="ip" x="190" y="615">2001:DB8:0:1::10/64</text>

  <!-- PC2 -->
  <use href="#pc" x="450" y="560"/>
  <text class="devname" x="450" y="510">PC2（静的）</text>
  <text class="ip" x="450" y="615">2001:DB8:0:1::11/64</text>

  <!-- PC3 -->
  <use href="#pc" x="750" y="560"/>
  <text class="devname" x="750" y="510">PC3（SLAAC）</text>
  <text class="ip" x="750" y="615">自動割当</text>
  <text class="ip" x="750" y="633">（2001:DB8:0:2::/64）</text>

  <!-- PC4 -->
  <use href="#pc" x="1010" y="560"/>
  <text class="devname" x="1010" y="510">PC4（SLAAC）</text>
  <text class="ip" x="1010" y="615">自動割当</text>
  <text class="ip" x="1010" y="633">（2001:DB8:0:2::/64）</text>

  <!-- goal note -->
  <rect x="50" y="690" width="1100" height="82" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text class="goal" x="70" y="718">🎯 ゴール: R1 で ipv6 unicast-routing を有効化し、静的セグメント（PC1⟷PC2）・SLAAC セグメント（PC3⟷PC4）の</text>
  <text class="goal" x="70" y="740">それぞれで IPv6 疎通を確認する。さらにセグメント間（PC1⟷PC3 等）でも ping が成功し、show ipv6 neighbors で</text>
  <text class="goal" x="70" y="762">NDP の近隣情報（IPv6-MAC 対応）が確認できること。</text>
</svg>
