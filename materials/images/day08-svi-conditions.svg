<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
  <defs>
    <style>
      text { font-family: "Noto Sans CJK JP", sans-serif; fill: #1f2937; }
      .title { font-size: 23px; font-weight: 700; }
      .sub { font-size: 14px; fill: #6b7280; }
      .section { font-size: 16px; font-weight: 700; }
      .cardtitle { font-size: 15px; font-weight: 700; text-anchor: middle; }
      .cardsub { font-size: 11.5px; text-anchor: middle; fill: #4b5563; }
      .gate { font-size: 15px; font-weight: 700; text-anchor: middle; fill: #ffffff; }
      .result { font-size: 18px; font-weight: 700; text-anchor: middle; }
      .note { font-size: 13px; text-anchor: middle; fill: #374151; }
      .link { stroke: #94a3b8; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1000" height="800" fill="#ffffff"/>

  <text class="title" x="40" y="40">SVI が up/up になるための 3 条件（AND 条件）</text>
  <text class="sub" x="40" y="64">① VLAN の存在　② ポートの up　③ no shutdown — いずれか 1 つでも欠けると SVI は up/up にならない</text>
  <text class="sub" x="40" y="82">（① が欠ける＝VLAN 未作成/suspend なら down/down、① と③ はあるが ② のみ欠けるなら up/down になる）</text>

  <!-- ============ Success case ============ -->
  <text class="section" x="40" y="108" fill="#7ea800">✅ 3 条件をすべて満たす場合</text>

  <!-- card 1 -->
  <rect x="50" y="120" width="260" height="95" rx="12" fill="#ffffff" stroke="#2779ca" stroke-width="2"/>
  <circle cx="80" cy="150" r="14" fill="#7ea800"/>
  <path d="M 73 150 L 78 156 L 88 143" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="cardtitle" x="180" y="171">① VLAN の存在</text>
  <text class="cardsub" x="180" y="196">VLAN データベースに作成済み</text>

  <!-- card 2 -->
  <rect x="370" y="120" width="260" height="95" rx="12" fill="#ffffff" stroke="#2779ca" stroke-width="2"/>
  <circle cx="400" cy="150" r="14" fill="#7ea800"/>
  <path d="M 393 150 L 398 156 L 408 143" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="cardtitle" x="500" y="171">② ポートの up</text>
  <text class="cardsub" x="500" y="196">所属ポートが 1 つ以上 up</text>

  <!-- card 3 -->
  <rect x="690" y="120" width="260" height="95" rx="12" fill="#ffffff" stroke="#2779ca" stroke-width="2"/>
  <circle cx="720" cy="150" r="14" fill="#7ea800"/>
  <path d="M 713 150 L 718 156 L 728 143" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="cardtitle" x="820" y="171">③ no shutdown</text>
  <text class="cardsub" x="820" y="196">SVI 自身が shutdown でない</text>

  <!-- arrows into AND gate -->
  <path class="link" d="M 180 215 L 180 238 Q 180 248 190 253 L 470 266" marker-end="url(#arrow)"/>
  <path class="link" d="M 500 215 L 500 253" marker-end="url(#arrow)"/>
  <path class="link" d="M 820 215 L 820 238 Q 820 248 810 253 L 530 266" marker-end="url(#arrow)"/>

  <circle cx="500" cy="273" r="32" fill="#2779ca"/>
  <text class="gate" x="500" y="279">AND</text>

  <path class="link" d="M 500 305 L 500 330" marker-end="url(#arrow)"/>

  <rect x="350" y="333" width="300" height="60" rx="10" fill="#ecfdf0" stroke="#7ea800" stroke-width="2"/>
  <text class="result" x="500" y="370" fill="#4d7c0f">Vlan10: up/up</text>

  <text class="note" x="500" y="413">→ VLAN10 のホストへ正常にルーティングできる</text>

  <line x1="40" y1="438" x2="960" y2="438" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ============ Failure case ============ -->
  <text class="section" x="40" y="473" fill="#b45309">❌ ② ポートの up のみが不成立の場合（① VLAN・③ no shutdown は満たす）</text>

  <!-- card 1 -->
  <rect x="50" y="485" width="260" height="95" rx="12" fill="#ffffff" stroke="#2779ca" stroke-width="2"/>
  <circle cx="80" cy="515" r="14" fill="#7ea800"/>
  <path d="M 73 515 L 78 521 L 88 508" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="cardtitle" x="180" y="536">① VLAN の存在</text>
  <text class="cardsub" x="180" y="561">VLAN データベースに作成済み</text>

  <!-- card 2 : failing -->
  <rect x="370" y="485" width="260" height="95" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5"/>
  <circle cx="400" cy="515" r="14" fill="#64748b"/>
  <path d="M 394 509 L 406 521 M 406 509 L 394 521" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <text class="cardtitle" x="500" y="536">② ポートの up</text>
  <text class="cardsub" x="500" y="561" fill="#64748b">所属ポートがすべて down</text>

  <!-- card 3 -->
  <rect x="690" y="485" width="260" height="95" rx="12" fill="#ffffff" stroke="#2779ca" stroke-width="2"/>
  <circle cx="720" cy="515" r="14" fill="#7ea800"/>
  <path d="M 713 515 L 718 521 L 728 508" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="cardtitle" x="820" y="536">③ no shutdown</text>
  <text class="cardsub" x="820" y="561">SVI 自身が shutdown でない</text>

  <!-- arrows into AND gate -->
  <path class="link" d="M 180 580 L 180 603 Q 180 613 190 618 L 470 631" marker-end="url(#arrow)"/>
  <path class="link" d="M 500 580 L 500 618" marker-end="url(#arrow)"/>
  <path class="link" d="M 820 580 L 820 603 Q 820 613 810 618 L 530 631" marker-end="url(#arrow)"/>

  <circle cx="500" cy="638" r="32" fill="#c98a02"/>
  <text class="gate" x="500" y="644">AND</text>

  <path class="link" d="M 500 670 L 500 695" marker-end="url(#arrow)"/>

  <rect x="350" y="698" width="300" height="60" rx="10" fill="#fffbeb" stroke="#c98a02" stroke-width="2"/>
  <text class="result" x="500" y="735" fill="#b45309">Vlan10: up/down</text>

  <text class="note" x="500" y="786">→ ② 所属ポートが全 down のため、ライン プロトコルのみ down（VLAN 自体は存在するため Status は up）。VLAN10 間のルーティングは成立しない</text>
</svg>
